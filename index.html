<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP PM Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F4F6F4; color: #1a1a18; margin: 0; }
.login-screen { display: flex; position: fixed; inset: 0; background: rgba(0,78,43,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
.login-box { background: #fff; border-radius: 14px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { font-size: 20px; font-weight: 700; color: #004E2B; margin-bottom: 6px; }
.login-logo span { color: #00DD39; }
.login-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
.login-label { font-size: 12px; color: #666; margin-bottom: 5px; }
.login-inp { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #D8E5DC; font-size: 14px; margin-bottom: 14px; }
.login-inp:focus { border-color: #004E2B; }
.login-btn { width: 100%; padding: 11px; background: #004E2B; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
.login-btn:hover { background: #003D22; }
.login-err { font-size: 12px; color: #dc2626; margin-top: 8px; }

.topbar { background: #004E2B; border-bottom: 1px solid #003D22; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
.topbar-left { display: flex; align-items: center; gap: 16px; }
.logo-text { font-size: 15px; font-weight: 600; color: #fff; }
.logo-text span { color: #00DD39; }
.nav { display: flex; gap: 2px; }
.nt { font-size: 13px; padding: 5px 13px; border-radius: 7px; border: none; background: transparent; cursor: pointer; color: rgba(255,255,255,0.75); }
.nt:hover { background: rgba(255,255,255,0.12); }
.nt.active { background: rgba(255,255,255,0.18); color: #fff; }
.nt.wk { font-size: 12px; padding: 4px 10px; }
.main { padding: 24px; max-width: 1200px; margin: 0 auto; }
.pg { display: none; }
.pg.active { display: block; }
.fr { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.fr select { font-size: 13px; padding: 5px 10px; border-radius: 7px; border: 1px solid #B8CEBC; background: #fff; }
.kg { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
.kc { background: #fff; border: 1px solid #D8E5DC; border-radius: 10px; padding: 14px; }
.kl { font-size: 11px; color: #888; margin-bottom: 4px; }
.kv { font-size: 24px; font-weight: 600; color: #004E2B; }
.cr { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.cc { background: #fff; border: 1px solid #D8E5DC; border-radius: 10px; padding: 16px; }
.cct { font-size: 13px; color: #666; margin-bottom: 12px; }
.tw { border: 1px solid #D8E5DC; border-radius: 10px; overflow: auto; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; background: #fff; }
th { text-align: left; font-size: 11px; font-weight: 600; color: #888; padding: 12px; border-bottom: 1px solid #D8E5DC; background: #F5FAF7; }
td { padding: 10px 12px; border-bottom: 1px solid #EAF2ED; }
tr:hover td { background: #F9FCFB; }
.badge { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 5px; font-weight: 600; }
.bja { background: #D6F0E2; color: #003D22; }
.bnee { background: #fee2e2; color: #991b1b; }
.user-info { font-size: 12px; color: rgba(255,255,255,0.6); margin-right: 6px; }
.logout-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: transparent; cursor: pointer; color: rgba(255,255,255,0.8); }
.logout-btn:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">SAP PM <span>Dashboard</span></div>
    <div class="login-sub">Heidelberg Materials</div>
    <div class="login-label">Email</div>
    <input class="login-inp" type="email" id="loginEmail" value="demo@example.com">
    <div class="login-label">Wachtwoord</div>
    <input class="login-inp" type="password" id="loginPassword" value="demo">
    <button class="login-btn" id="loginBtn">Inloggen</button>
    <div class="login-err" id="loginError"></div>
  </div>
</div>

<div id="appShell" style="display:none">
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-text">SAP PM <span>Dashboard</span></div>
    <nav class="nav">
      <button class="nt active" onclick="showPage('dashboard')">Dashboard</button>
      <button class="nt" onclick="showPage('backlog')">Backlog</button>
    </nav>
  </div>
  <div><span class="user-info" id="userInfo"></span><button class="logout-btn" onclick="signOut()">Uitloggen</button></div>
</div>

<div class="main">
  <div class="pg active" id="pg-dashboard">
    <div class="fr">
      <label>Week:</label>
      <select id="fWeek" onchange="renderDash()"><option value="all">Alle</option></select>
    </div>
    <div class="kg" id="dKpis"></div>
    <div class="cr">
      <div class="cc"><div class="cct">WO's</div><div style="height:200px"><canvas id="lc"></canvas></div></div>
      <div class="cc"><div class="cct">Status</div><div style="height:200px"><canvas id="bc"></canvas></div></div>
    </div>
    <div style="margin-top:20px"><div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">WERKORDERS</div><div id="dTbl"></div></div>
  </div>

  <div class="pg" id="pg-backlog">
    <div style="font-size:20px;font-weight:600;margin-bottom:16px">Backlog</div>
    <div class="kg" id="bKpis"></div>
    <div id="bTbl"></div>
  </div>
</div>
</div>

<script>
let lcI, bcI, weeks=[], currentUser;
function kc(l,v){return `<div class="kc"><div class="kl">${l}</div><div class="kv">${v}</div></div>`;}
function getWeeks(){
  return [
    {id:'w19',week:19,label:'4–8 mei',rows:[{day:'Ma',wo:'11870431',omschrijving:'KL4711: ventiel',wie:'Jeroen',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie',wie:'Sjoerd',type:'gepland',status:'ja'},{day:'Wo',wo:'11729163',omschrijving:'TB2420: controle',wie:'Nello',type:'gepland',status:'ja'},{day:'Do',wo:'32052539',omschrijving:'PG5210: filter',wie:'Nello',type:'gepland',status:'ja'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]},
    {id:'w20',week:20,label:'11–15 mei',rows:[{day:'Ma',wo:'11859805',omschrijving:'OV4731: waaier',wie:'Nello',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie',wie:'Nello',type:'gepland',status:'ja'},{day:'Wo',wo:'11882139',omschrijving:'DB4720: voorbereiding',wie:'Thomas',type:'gepland',status:'ja'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]},
    {id:'w21',week:21,label:'18–22 mei',rows:[{day:'Ma',wo:'11870431',omschrijving:'KL4711: ventiel',wie:'Jeroen',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie',wie:'Sjoerd',type:'gepland',status:'ja'},{day:'Wo',wo:'11873794',omschrijving:'DB2410: lagers',wie:'Jeroen',type:'gepland',status:'ja'},{day:'Do',wo:'11880330',omschrijving:'EL2310: instroom',wie:'Nello',type:'gepland',status:'ja'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]},
    {id:'w22',week:22,label:'25–29 mei',rows:[{day:'Di',wo:'11873794',omschrijving:'DB2410: lager',wie:'Jeroen',type:'gepland',status:'ja'},{day:'Wo',wo:'11882139',omschrijving:'DB4720: band',wie:'Jeroen',type:'gepland',status:'nee'},{day:'Do',wo:'23303735',omschrijving:'KM4910: koelers',wie:'Nello',type:'gepland',status:'nee'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: schoonmaken',wie:'Allen',type:'gepland',status:'nee'}]},
    {id:'w23',week:23,label:'1–5 juni',rows:[{day:'Ma',wo:'11870431',omschrijving:'KL4711: ventiel',wie:'Jeroen',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie',wie:'Sjoerd',type:'gepland',status:'ja'},{day:'Wo',wo:'11880424',omschrijving:'OI2471: fluortest',wie:'Max',type:'gepland',status:'ja'},{day:'Do',wo:'11886093',omschrijving:'SC5270: lekkage',wie:'Jeroen',type:'gepland',status:'nee'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: schoonmaken',wie:'Allen',type:'gepland',status:'deels'}]},
    {id:'w24',week:24,label:'8–12 juni',rows:[{day:'Ma',wo:'11882139',omschrijving:'DB4720: band',wie:'Sjoerd',type:'gepland',status:'ja'},{day:'Di',wo:'11879557',omschrijving:'VE6200: borden',wie:'Nello',type:'gepland',status:'uc'},{day:'Di',wo:'11872827',omschrijving:'SC4043: cilinder',wie:'Nello',type:'gepland',status:'nee'},{day:'Wo',wo:'23303735',omschrijving:'KM4910: koelers',wie:'Sjoerd',type:'gepland',status:'nee'},{day:'Do',wo:'11878318',omschrijving:'Luchtlekkages',wie:'Thomas',type:'gepland',status:'nee'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]}
  ];
}
function renderDash(){
  const allRows=weeks.flatMap(w=>w.rows.map(r=>({...r,_wk:`W${w.week}`})));
  const ja=allRows.filter(r=>r.status==='ja').length, nee=allRows.filter(r=>r.status==='nee').length;
  document.getElementById('dKpis').innerHTML=kc('Totaal',allRows.length)+kc('Afgerond',ja)+kc('Openstaand',nee);
  let html='<div class="tw"><table><thead><tr><th>Week</th><th>Order</th><th>Omschrijving</th><th>Wie</th><th>Status</th></tr></thead><tbody>';
  allRows.forEach(r=>{html+=`<tr><td>${r._wk}</td><td>${r.wo}</td><td>${r.omschrijving}</td><td>${r.wie}</td><td><span class="badge ${r.status==='ja'?'bja':'bnee'}">${r.status}</span></td></tr>`;});
  document.getElementById('dTbl').innerHTML=html+'</tbody></table></div>';
}
function renderBacklog(){
  const unique=Array.from(new Set(weeks.flatMap(w=>w.rows.map(r=>r.wo)))).filter(wo=>wo!=='—').map(wo=>{const all=weeks.flatMap(w=>w.rows).filter(r=>r.wo===wo); return all[all.length-1];});
  document.getElementById('bKpis').innerHTML=kc('Totaal',unique.length)+kc('Openstaand',unique.filter(u=>u.status!=='ja').length);
  let html='<div class="tw"><table><thead><tr><th>Order</th><th>Omschrijving</th><th>Status</th></tr></thead><tbody>';
  unique.forEach(r=>{html+=`<tr><td>${r.wo}</td><td>${r.omschrijving}</td><td><span class="badge ${r.status==='ja'?'bja':'bnee'}">${r.status}</span></td></tr>`;});
  document.getElementById('bTbl').innerHTML=html+'</tbody></table></div>';
}
function showPage(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  if(event.target) event.target.classList.add('active');
  if(id==='dashboard') renderDash();
  else renderBacklog();
}
function signOut(){
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginScreen').style.justifyContent='center';
}
document.getElementById('loginBtn').onclick=()=>{
  currentUser=document.getElementById('loginEmail').value;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
  document.getElementById('userInfo').textContent=currentUser;
  weeks=getWeeks();
  const select=document.getElementById('fWeek');
  select.innerHTML='<option value="all">Alle</option>';
  weeks.forEach(w=>{
    const opt=document.createElement('option');
    opt.value=w.id;
    opt.textContent='Week '+w.week;
    select.appendChild(opt);
  });
  showPage('dashboard');
};
</script>
</body>
</html>
