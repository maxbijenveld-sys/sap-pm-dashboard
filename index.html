<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP PM Weekplanning Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  .login-screen{display:none;position:fixed;inset:0;background:#004E2B;z-index:999;flex-direction:column;align-items:center;justify-content:center}
  .login-box{background:#fff;border-radius:14px;padding:40px 36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .login-logo{font-size:20px;font-weight:700;color:#004E2B;margin-bottom:6px}
  .login-logo span{color:#00DD39}
  .login-sub{font-size:13px;color:#888;margin-bottom:28px}
  .login-label{font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
  .login-inp{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #D8E5DC;font-size:14px;margin-bottom:14px;outline:none}
  .login-inp:focus{border-color:#004E2B}
  .login-btn{width:100%;padding:11px;background:#004E2B;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
  .login-btn:hover{background:#003D22}
  .login-btn:disabled{opacity:.6;cursor:default}
  .login-err{font-size:12px;color:#dc2626;margin-top:8px;min-height:18px}
  .logout-btn{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:transparent;cursor:pointer;color:rgba(255,255,255,0.8)}
  .logout-btn:hover{background:rgba(255,255,255,0.1)}
  .user-info{font-size:12px;color:rgba(255,255,255,0.6);margin-right:6px}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F6F4;color:#1a1a18;font-size:14px;min-height:100vh}
  .topbar{background:#004E2B;border-bottom:1px solid #003D22;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:16px}
  .logo{font-size:15px;font-weight:600;color:#fff}
  .logo span{color:#00DD39}
  .nav{display:flex;gap:2px}
  .nt{font-size:13px;padding:5px 13px;border-radius:7px;border:none;background:transparent;cursor:pointer;color:rgba(255,255,255,0.75)}
  .nt:hover{background:rgba(255,255,255,0.12)}
  .nt.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:500}
  .nt.wk{font-size:12px;padding:4px 10px}
  .nt.add{color:#00DD39;border:1px dashed rgba(0,221,57,0.5);background:transparent}
  .nt.add:hover{background:rgba(0,221,57,0.1)}
  .upload-btn{display:flex;align-items:center;gap:7px;font-size:13px;padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);cursor:pointer;color:#fff;font-weight:500}
  .upload-btn:hover{background:rgba(255,255,255,0.2)}
  .upload-btn svg{width:15px;height:15px;stroke:#fff}
  .main{padding:24px;max-width:1200px;margin:0 auto}
  .pg{display:none}.pg.active{display:block}
  .fr{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .fr label{font-size:13px;color:#666}
  .fr select{font-size:13px;padding:5px 10px;border-radius:7px;border:1px solid #B8CEBC;background:#fff;color:#1a1a18;cursor:pointer}
  .kg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
  .kc{background:#fff;border:1px solid #D8E5DC;border-radius:10px;padding:14px 16px}
  .kl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
  .kv{font-size:24px;font-weight:600;color:#1a1a18}
  .ks{font-size:11px;color:#888;margin-top:3px}
  .cr{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .cc{background:#fff;border:1px solid #D8E5DC;border-radius:10px;padding:16px 18px}
  .cct{font-size:13px;color:#666;margin-bottom:8px;font-weight:500}
  .leg{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#666;margin-bottom:10px}
  .leg span{display:flex;align-items:center;gap:5px}
  .ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .sl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px}
  .tw{border:1px solid #D8E5DC;border-radius:10px;overflow:hidden;margin-bottom:20px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  th{text-align:left;font-size:11px;font-weight:600;color:#888;padding:8px 10px;border-bottom:1px solid #D8E5DC;background:#F5FAF7}
  td{padding:7px 10px;border-bottom:1px solid #EAF2ED;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#F5FAF7}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}
  .bja{background:#D6F0E2;color:#003D22}.bnee{background:#fee2e2;color:#991b1b}
  .bdeels{background:#fef3c7;color:#92400e}.buc{background:#dbeafe;color:#1e40af}
  .bg2{background:#d1fae5;color:#065f46}.bo2{background:#ffe4d6;color:#9a3412}
  .pb{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .pn{font-size:13px;min-width:72px;color:#1a1a18}
  .pbg{flex:1;height:8px;background:#EAF2ED;border-radius:4px;overflow:hidden}
  .pbf{height:100%;border-radius:4px;background:#004E2B}
  .pbc{font-size:12px;color:#888;min-width:20px;text-align:right}
  .dtr{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
  .dt2{font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid #C8DACD;background:#fff;cursor:pointer;color:#666}
  .dt2.active{background:#EAF2ED;color:#1a1a18;font-weight:500;border-color:#ccc}
  .wf{background:#fff;border:1px solid #D8E5DC;border-radius:10px;padding:20px;margin-bottom:16px}
  .btn{font-size:13px;padding:7px 16px;border-radius:7px;border:1px solid #B8CEBC;background:#fff;cursor:pointer;color:#1a1a18;font-weight:500}
  .btn:hover{background:#F4F6F4}
  .btn-p{background:#004E2B;color:#fff;border-color:transparent}
  .btn-p:hover{background:#003D22}
  .btn-del{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
  .btn-del:hover{background:#fecaca}
  .uz{border:2px dashed #B8CEBC;border-radius:10px;padding:32px;text-align:center;cursor:pointer;color:#888;margin-bottom:16px;transition:border-color .2s,background .2s}
  .uz:hover{border-color:#004E2B;background:#E8F5EE;color:#004E2B}
  .uz svg{width:32px;height:32px;stroke:currentColor;margin:0 auto 8px;display:block}
  .uz-title{font-size:14px;font-weight:500;margin-bottom:4px}
  .uz-sub{font-size:12px}
  .note{font-size:12px;color:#666;background:#F4F6F4;border-radius:7px;padding:8px 12px;margin-bottom:16px;border-left:3px solid #B8CEBC}
  .gstatus{font-size:13px;padding:10px 24px;border-bottom:1px solid #D6F0E2}
  .gstatus.success{background:#D6F0E2;color:#003D22}
  .gstatus.error{background:#fee2e2;color:#991b1b}
  .gstatus.info{background:#EAF2ED;color:#1a1a18}
  .note.success{background:#D6F0E2;border-color:#22c55e;color:#003D22}
  .note.error{background:#fee2e2;border-color:#ef4444;color:#991b1b}
  .whr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .wt{font-size:20px;font-weight:600}
  .ws{font-size:13px;color:#888;margin-top:2px}
  .empty{text-align:center;padding:60px 20px;color:#888}
  .empty-title{font-size:15px;font-weight:500;margin-bottom:6px;color:#999}
  .inp{width:100%;font-size:13px;padding:6px 9px;border-radius:7px;border:1px solid #B8CEBC;background:#fff;color:#1a1a18}
  .inp:focus{outline:none;border-color:#004E2B}
  .row-grid{display:grid;grid-template-columns:58px 90px 1fr 100px 80px 80px 32px;gap:6px;margin-bottom:6px;align-items:center}
  .col-hdr{font-size:11px;color:#888;padding:0 2px}
  @media(max-width:900px){
    .kg{grid-template-columns:repeat(3,1fr)}
    .cr{grid-template-columns:1fr}
    .row-grid{grid-template-columns:1fr 1fr;gap:4px}
    .topbar{flex-wrap:wrap;height:auto;padding:10px 16px;gap:8px}
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">SAP PM <span>Dashboard</span></div>
    <div class="login-sub">Heidelberg Materials — Onderhoud</div>
    <div class="login-label">E-mailadres</div>
    <input class="login-inp" type="email" id="loginEmail" placeholder="naam@heidelbergmaterials.com" onkeydown="if(event.key==='Enter')handleLogin()">
    <div class="login-label">Wachtwoord</div>
    <input class="login-inp" type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()">
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Inloggen</button>
    <div class="login-err" id="loginError"></div>
  </div>
</div>

<div id="appShell" style="display:none">
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">SAP PM <span>Dashboard</span></div>
    <nav class="nav" id="mainNav">
      <button class="nt active" onclick="showPage('dashboard')">Dashboard</button>
      <button class="nt" onclick="showPage('backlog')">Backlog</button>
      <span id="wkTabs"></span>
      <button class="nt add" onclick="showPage('addweek')" style="display:none">+ Week toevoegen</button>
    </nav>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="user-info" id="userInfo"></span>
    <button class="logout-btn" onclick="signOut()">Uitloggen</button>
  </div>
</div>
<div id="globalStatus"></div>

<div class="main">
  <div class="pg active" id="pg-dashboard">
    <div class="fr">
      <label>Week:</label>
      <select id="fWeek" onchange="renderDash()">
        <option value="all">Alle weken</option>
      </select>
      <label>Type:</label>
      <select id="fType" onchange="renderDash()">
        <option value="all">Gepland + ongepland</option>
        <option value="gepland">Alleen gepland</option>
        <option value="ongepland">Alleen ongepland</option>
      </select>
    </div>
    <div class="kg" id="dKpis"></div>
    <div class="cr">
      <div class="cc">
        <div class="cct lc-title">WO's per week</div>
        <div class="leg">
          <span><span class="ld" style="background:#004E2B"></span>Gepland</span>
          <span><span class="ld" style="background:#00DD39;border:1px dashed #00DD39;background:transparent"></span>Ongepland</span>
        </div>
        <div style="position:relative;height:220px"><canvas id="lc"></canvas></div>
      </div>
      <div class="cc">
        <div class="cct bc-title">Uitvoering per week</div>
        <div class="leg">
          <span><span class="ld" style="background:#004E2B"></span>Ja</span>
          <span><span class="ld" style="background:#dc2626"></span>Nee</span>
        </div>
        <div style="position:relative;height:220px"><canvas id="bc"></canvas></div>
      </div>
    </div>
    <div class="sl">Werkorders overzicht</div>
    <div id="dTbl"></div>
  </div>

  <div class="pg" id="pg-backlog">
    <div class="whr">
      <div><div class="wt">Backlog</div><div class="ws">Unieke werkorders per ordernummer</div></div>
    </div>
    <div class="kg" id="bKpis"></div>
    <div id="bTbl"></div>
  </div>

  <div id="wkPages"></div>
</div>
</div>

<script>
const SUPABASE_URL='https://gohmnfgpczaeoysamlwy.supabase.co';
const SUPABASE_KEY='sb_publishable_eoIJ0jmspVLW9u-9u7QeNA_IXTD8EwY';
const SUPABASE_SERVICE_KEY='sb_secret_z9_sy8p8XTYqYl7sOksggQ_tU33zNx7';
const ADMIN_EMAILS=['maxbijenveld@hotmail.com','max.beijenveld.ext@heidelbergmaterials.com'];

let lcI=null,bcI=null;
let weeks=[];
let currentUser=null;
let isAdmin=false;

async function sbFetch(path,opts={}){
  const headers={'apikey':SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})};
  if(currentUser?.access_token) headers['Authorization']='Bearer '+currentUser.access_token;
  const r=await fetch(SUPABASE_URL+path,{...opts,headers});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:r.json();
}

async function loadWeeksFromDB(){
  const data=await sbFetch('/rest/v1/weeks?order=week.asc&select=*');
  return data||[];
}

async function signIn(email,password){
  const r=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email,password})
  });
  const data=await r.json();
  if(data.error) throw new Error(data.error_description||data.error);
  return data;
}

async function signOut(){
  currentUser=null;isAdmin=false;weeks=[];
  localStorage.removeItem('sap_pm_session');
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginError').textContent='';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPassword').value='';
}

async function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  if(!email||!pw){errEl.textContent='Vul e-mail en wachtwoord in';return;}
  btn.textContent='Inloggen...';btn.disabled=true;
  try{
    const session=await signIn(email,pw);
    currentUser=session;
    localStorage.setItem('sap_pm_session',JSON.stringify(session));
    await initApp();
  }catch(e){
    errEl.textContent='Ongeldig e-mailadres of wachtwoord';
  }
  btn.textContent='Inloggen';btn.disabled=false;
}

async function initApp(){
  isAdmin=ADMIN_EMAILS.includes((currentUser?.user?.email||'').toLowerCase().trim());
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
  document.getElementById('userInfo').textContent=currentUser?.user?.email||'';
  
  try{
    const dbWeeks=await loadWeeksFromDB();
    if(dbWeeks.length) weeks=dbWeeks;
    else weeks=getDefaultWeeks();
  }catch(e){
    showGlobalStatus('Fout bij laden: '+e.message,'error');
    weeks=getDefaultWeeks();
  }
  
  refreshTabs();refreshFilter();renderDash();
}

function showGlobalStatus(msg,type){
  const el=document.getElementById('globalStatus');
  if(!el)return;
  el.innerHTML=`<div class="gstatus ${type||'info'}">${msg}</div>`;
  setTimeout(()=>{el.innerHTML='';},5000);
}

function getDefaultWeeks(){
  return[
    {id:'w19',week:19,label:'4–8 mei 2026',rows:[{day:'Ma',wo:'11870431',omschrijving:'KL4711: ventiel lekt',wie:'Jeroen',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie & smeren',wie:'Sjoerd, Nello, Evert',type:'gepland',status:'ja'},{day:'Wo',wo:'11729163',omschrijving:'TB2420: controle rolstellen',wie:'Sjoerd, Nello',type:'gepland',status:'ja'},{day:'Do',wo:'32052539',omschrijving:'PG5210: aanzuigfilter vervangen',wie:'Nello',type:'gepland',status:'ja'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: werkplaats schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]},
    {id:'w20',week:20,label:'11–15 mei 2026',rows:[{day:'Ma',wo:'11859805',omschrijving:'OV4731: waaier schoonmaken',wie:'Nello, Thomas',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie & smeren',wie:'Nello, Thomas',type:'gepland',status:'ja'},{day:'Wo',wo:'11882139',omschrijving:'DB4720: voorbereiding bandwissel',wie:'Thomas, Nello',type:'gepland',status:'ja'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: werkplaats schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]},
    {id:'w21',week:21,label:'18–22 mei 2026',rows:[{day:'Ma',wo:'11870431',omschrijving:'KL4711: ventiel lekt',wie:'Jeroen, Thomas',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie & smeren',wie:'Sjoerd, Nello',type:'gepland',status:'ja'},{day:'Wo',wo:'11873794',omschrijving:'DB2410: lagers vervangen',wie:'Jeroen, Thomas',type:'gepland',status:'ja'},{day:'Do',wo:'11880330',omschrijving:'EL2310: instroom repareren',wie:'Nello, Sjoerd',type:'gepland',status:'ja'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: werkplaats schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]},
    {id:'w22',week:22,label:'25–29 mei 2026',rows:[{day:'Di',wo:'11873794',omschrijving:'DB2410: lager zuid',wie:'Jeroen, Thomas, Lars',type:'gepland',status:'ja'},{day:'Wo',wo:'11882139',omschrijving:'DB4720: band beschadigingen',wie:'Jeroen, Thomas',type:'gepland',status:'nee'},{day:'Do',wo:'23303735',omschrijving:'KM4910: oliekoelers vervangen',wie:'Nello, Sjoerd',type:'gepland',status:'nee'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: werkplaats schoonmaken',wie:'Allen',type:'gepland',status:'nee'}]},
    {id:'w23',week:23,label:'1–5 juni 2026',rows:[{day:'Ma',wo:'11870431',omschrijving:'KL4711: ventiel lekt',wie:'Jeroen, Nello',type:'gepland',status:'nee'},{day:'Di',wo:'31858073',omschrijving:'KR2410: inspectie & smeren',wie:'Sjoerd, Nello, Evert',type:'gepland',status:'ja'},{day:'Wo',wo:'11880424',omschrijving:'OI2471: fluortest',wie:'van Dijk, Max',type:'gepland',status:'ja'},{day:'Do',wo:'11886093',omschrijving:'SC5270: luchtlekkage',wie:'Jeroen, Sjoerd',type:'gepland',status:'nee'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: werkplaats schoonmaken',wie:'Allen',type:'gepland',status:'deels'}]},
    {id:'w24',week:24,label:'8–12 juni 2026',rows:[{day:'Ma',wo:'11882139',omschrijving:'DB4720: band beschadigingen',wie:'Sjoerd, Thomas, Nello',type:'gepland',status:'ja'},{day:'Di',wo:'11879557',omschrijving:'VE6200: borden ophangen',wie:'Nello, Lars',type:'gepland',status:'uc'},{day:'Di',wo:'11872827',omschrijving:'SC4043: cilinder omwisselen',wie:'Nello, Lars',type:'gepland',status:'nee'},{day:'Wo',wo:'23303735',omschrijving:'KM4910: oliekoelers vervangen',wie:'Sjoerd, Lars',type:'gepland',status:'nee'},{day:'Do',wo:'11878318',omschrijving:'Diverse luchtlekkages',wie:'Thomas, Sjoerd',type:'gepland',status:'nee'},{day:'Vr',wo:'32006436',omschrijving:'GB0050: werkplaats schoonmaken',wie:'Allen',type:'gepland',status:'ja'}]}
  ];
}

function kpis(rows){const t=rows.length,ja=rows.filter(r=>r.status==='ja').length,nee=rows.filter(r=>r.status==='nee').length,g=rows.filter(r=>r.type==='gepland').length,o=rows.filter(r=>r.type==='ongepland').length,pct=t>0?Math.round(ja/t*100):0;return{t,ja,nee,g,o,pct};}
function kc(l,v,s=''){return`<div class="kc"><div class="kl">${l}</div><div class="kv">${v}</div><div class="ks">${s}</div></div>`;}
function sb(s){if(s==='ja')return'<span class="badge bja">Ja</span>';if(s==='nee')return'<span class="badge bnee">Nee</span>';return'<span class="badge bdeels">Deels</span>';}

function renderDash(){
  const wf=document.getElementById('fWeek').value;
  const tf=document.getElementById('fType').value;
  const fWks=wf==='all'?weeks:weeks.filter(w=>w.id===wf);
  let allRows=[];
  fWks.forEach(w=>w.rows.filter(r=>tf==='all'||r.type===tf).forEach(r=>allRows.push({...r,_wk:`W${w.week}`})));
  const k=kpis(allRows);
  document.getElementById('dKpis').innerHTML=kc('Totaal',k.t)+kc('Afgerond',k.ja,k.pct+'%')+kc('Openstaand',k.nee)+kc('Gepland',k.g)+kc('Ongepland',k.o);
  
  const DAYS=['Ma','Di','Wo','Do','Vr'];
  const gD=DAYS.map(d=>allRows.filter(r=>r.day===d&&r.type==='gepland').length);
  const oD=DAYS.map(d=>allRows.filter(r=>r.day===d&&r.type==='ongepland').length);
  const jaD=DAYS.map(d=>allRows.filter(r=>r.day===d&&r.status==='ja').length);
  const neeD=DAYS.map(d=>allRows.filter(r=>r.day===d&&r.status==='nee').length);
  
  if(lcI)lcI.destroy();
  lcI=new Chart(document.getElementById('lc'),{type:'line',data:{labels:DAYS,datasets:[{label:'Gepland',data:gD,borderColor:'#004E2B',backgroundColor:'rgba(0,78,43,0.07)',tension:.35,borderWidth:2,pointRadius:4},{label:'Ongepland',data:oD,borderColor:'#00DD39',backgroundColor:'rgba(0,221,57,0.07)',tension:.35,borderWidth:2,borderDash:[5,4]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true}}}});
  
  if(bcI)bcI.destroy();
  bcI=new Chart(document.getElementById('bc'),{type:'bar',data:{labels:DAYS,datasets:[{label:'Ja',data:jaD,backgroundColor:'#004E2B'},{label:'Nee',data:neeD,backgroundColor:'#dc2626'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true}}}});
  
  let th=`<div class="tw"><table><thead><tr><th>Week</th><th>Dag</th><th>Order</th><th>Omschrijving</th><th>Wie</th><th>Type</th><th>Status</th></tr></thead><tbody>`;
  allRows.forEach(r=>{th+=`<tr><td>${r._wk}</td><td>${r.day}</td><td>${r.wo}</td><td>${r.omschrijving}</td><td>${r.wie}</td><td>${r.type==='gepland'?'<span class="badge bg2">Gepland</span>':'<span class="badge bo2">Ongepland</span>'}</td><td>${sb(r.status)}</td></tr>`;});
  document.getElementById('dTbl').innerHTML=th+'</tbody></table></div>';
}

function renderBacklog(){
  const byOrder={};
  weeks.forEach(w=>w.rows.forEach(r=>{if(!r.wo||r.wo==='—')return;if(!byOrder[r.wo])byOrder[r.wo]=[];byOrder[r.wo].push(r);}));
  const unique=[];
  Object.values(byOrder).forEach(entries=>{unique.push({...entries[entries.length-1],_occ:entries.length});});
  const total=unique.length,open=unique.filter(u=>u.status!=='ja').length;
  document.getElementById('bKpis').innerHTML=kc('Totaal',total)+kc('Open',open)+kc('Afgerond',total-open);
  let th=`<div class="tw"><table><thead><tr><th>Order</th><th>Omschrijving</th><th>Wie</th><th>Type</th><th>Status</th></tr></thead><tbody>`;
  unique.forEach(r=>{th+=`<tr><td>${r.wo}</td><td>${r.omschrijving}</td><td>${r.wie}</td><td>${r.type==='gepland'?'<span class="badge bg2">Gepland</span>':'<span class="badge bo2">Ongepland</span>'}</td><td>${sb(r.status)}</td></tr>`;});
  document.getElementById('bTbl').innerHTML=th+'</tbody></table></div>';
}

function refreshFilter(){const s=document.getElementById('fWeek');s.innerHTML='<option value="all">Alle weken</option>';weeks.forEach(w=>{const o=document.createElement('option');o.value=w.id;o.textContent=`Week ${w.week}`;s.appendChild(o);});}
function refreshTabs(){const c=document.getElementById('wkTabs');c.innerHTML='';weeks.forEach(w=>{const b=document.createElement('button');b.className='nt wk';b.textContent=`W${w.week}`;b.onclick=()=>showPage('dashboard');c.appendChild(b);});}
function showPage(id){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));const pg=document.getElementById('pg-'+id);if(pg){pg.classList.add('active');if(id==='dashboard'){document.querySelector('.nt').classList.add('active');renderDash();}else if(id==='backlog'){document.querySelectorAll('.nt')[1].classList.add('active');renderBacklog();}}}

(async()=>{
  try{const stored=localStorage.getItem('sap_pm_session');if(stored){const session=JSON.parse(stored);const r=await fetch(SUPABASE_URL+'/auth/v1/user',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+session.access_token}});if(r.ok){currentUser=session;await initApp();return;}}}catch(e){}
  document.getElementById('loginScreen').style.display='flex';
})();
</script>
